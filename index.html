<!DOCTYPE html>
<html>
<head>
    <title>My Profile</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f7fa;
            margin: 0;
            padding: 0;
        }

        .profile-container {
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #007bff;
        }

        h2 {
            color: #333;
            margin-top: 15px;
        }

        p {
            color: #666;
            margin: 8px 0;
        }

        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<div class="profile-container">
    <img src="https://via.placeholder.com/120" alt="Profile Picture" class="profile-img">

    <h2>Deepu</h2>
    <p><strong>Department:</strong> CSE</p>
    <p><strong>Email:</strong> deepu@example.com</p>
    <p><strong>Phone:</strong> +91 9876543210</p>
    <p><strong>Location:</strong> Andhra Pradesh, India</p>

    <a href="#" class="btn">Edit Profile</a>
</div>

</body>
</html>
